version: '3.8'

services:
  localstack:
    container_name: url-shortener-localstack
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - LOCALSTACK_AUTH_TOKEN=ls-gezahUVo-sUlO-fAlU-7348-JOMaHIvud77f
      - SERVICES=dynamodb,lambda,apigateway,iam
      - DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - LAMBDA_EXECUTOR=docker
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - localstack-data:/var/lib/localstack
